suite: agent-json-syntax-compare

defaults:
  timeout_ms: 30000
  retries: 2

cases:
  - id: json-gpt4o-mini
    model: openai/gpt-4o-mini
    prompt: 'Return only valid JSON: {"status":"ok"}'
    expect_json: true

  - id: json-gemini
    model: google/gemini-2.5-flash-lite
    prompt: 'Return only valid JSON: {"status":"ok"}'
    expect_json: true

  - id: json-llama
    model: meta-llama/llama-3.1-8b-instruct
    prompt: 'Return only valid JSON: {"status":"ok"}'
    expect_json: true