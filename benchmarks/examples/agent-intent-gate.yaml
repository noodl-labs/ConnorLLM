suite: agent-intent-gate

defaults:
  timeout_ms: 45000
  retries: 2

cases:
  - id: classify-edit-request
    model: gpt-4o-mini          # id tel que le gateway staging l’expose
    prompt: |
      You are the intent router. Return only raw JSON, no markdown.
      User message: "refactor this function to use async"
      Schema: {"intent":"edit|chat|search","confidence":number}
    expect_json_schema:
      type: object
      required: [intent, confidence]
      properties:
        intent: { type: string, enum: [edit, chat, search] }
        confidence: { type: number, minimum: 0, maximum: 1 }

  - id: gateway-health-pong
    model: gpt-4o-mini
    prompt: "Reply with exactly one word: pong"
    expect_contains: pong