suite: serving-smoke

defaults:
  timeout_ms: 30000
  retries: 2

cases:
  - id: ping-gemini
    model: google/gemini-2.5-flash-lite
    prompt: "Reply with exactly one word: pong"
    expect_contains: pong

  - id: ping-llama
    model: meta-llama/llama-3.1-8b-instruct
    prompt: "Reply with exactly one word: pong"
    expect_contains: pong

  - id: json-ok
    model: openai/gpt-4o-mini
    prompt: 'Return only valid JSON, no markdown: {"status":"ok"}'
    expect_json: true
